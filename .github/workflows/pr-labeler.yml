name: PR Auto Labeler

on:
  pull_request:
    types: [opened, edited]

jobs:
  label:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write

    steps:
      - name: Label PR based on type
        uses: actions/github-script@v9
        with:
          script: |
            const body = context.payload.pull_request.body || '';
            const checkbox = '\\[\\s*x\\s*\\]';

            const labelMap = [
              { pattern: new RegExp(`-\\s*${checkbox}\\s*Bugfix`, 'i'),      label: 'bug' },
              { pattern: new RegExp(`-\\s*${checkbox}\\s*Feature`, 'i'),     label: 'new-feature' },
              { pattern: new RegExp(`-\\s*${checkbox}\\s*Refactoring`, 'i'), label: 'refactoring' },
              { pattern: new RegExp(`-\\s*${checkbox}\\s*Style`, 'i'),       label: 'style' },
              { pattern: new RegExp(`-\\s*${checkbox}\\s*Localization`, 'i'), label: 'localization' },
            ];

            const labelsToAdd = labelMap
              .filter(({ pattern }) => pattern.test(body))
              .map(({ label }) => label);

            if (labelsToAdd.length === 0) return;

            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.pull_request.number,
              labels: labelsToAdd,
            });
